# SMOKE — минимальная проверка работоспособности скрипта
# 1 конфиг, 1 прогон. Не для анализа результатов.
gpu_price_per_hour: 0.0
device: "cuda"
runs_per_case: 1
config_timeout_seconds: 300
per_audio_timeout_seconds: 120

configurations:

  - id: "large_v3_int8_beam5"
    model: "large-v3"
    compute_type: "int8"
    vad_filter: true
    language_mode: "auto"
    beam_size: 5
    batch_size: 1
    chunk_length: 30

